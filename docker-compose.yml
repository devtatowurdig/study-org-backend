services:
  postgres:
    image: postgres:17-alpine
    container_name: study-org-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: study_org
      POSTGRES_USER: study_org
      POSTGRES_PASSWORD: study_org
    ports:
      - "3072:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U study_org -d study_org"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: study-org-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://study_org:study_org@postgres:5432/study_org?schema=public
      API_PORT: ${API_PORT:-3071}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://studyorg.frameworksenac.com.br,http://studyorg.frameworksenac.com.br:3070,https://studyorg.frameworksenac.com.br:3070}
      ALLOWED_ORIGIN_PATTERNS: ${ALLOWED_ORIGIN_PATTERNS:-^https?://[^/]+:3070}
      JWT_SECRET: ${JWT_SECRET:?Defina JWT_SECRET no ambiente antes de subir em producao}
    ports:
      - "${API_PORT:-3071}:3071"

volumes:
  postgres_data:
