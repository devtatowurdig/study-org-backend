services:
  postgres:
    image: postgres:17-alpine
    container_name: study-org-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: study_org
      POSTGRES_USER: study_org
      POSTGRES_PASSWORD: study_org
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U study_org -d study_org"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: study-org-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://study_org:study_org@postgres:5432/study_org?schema=public
      PORT: 3000
    ports:
      - "3000:3000"
    command: sh -c "npm run prisma:generate && npm run prisma:push && npm run start"

volumes:
  postgres_data:
